name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy via DO Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via DO server (pull, build, deploy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 167.172.244.201
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            export PNPM_HOME=/root/.local/share/pnpm
            export PATH=$PNPM_HOME:$PATH
            export NODE_OPTIONS="--max_old_space_size=1536"
            export NETLIFY_AUTH_TOKEN=nfp_xxmxU76u3iGfxMCemvPdzDfVrVocc9C10c19
            export NETLIFY_SITE_ID=31682fc2-cc0f-4bf2-aad5-d9bcbc77eaa3
            
            cd /opt/facesmash-dev-portal
            
            # Pull latest from GitHub
            GIT_SSH_COMMAND="ssh -i /root/.ssh/facesmash-devportal-deploy -o StrictHostKeyChecking=no" \
              git pull origin main
            
            # Clean build artifacts
            rm -rf .next .netlify
            
            # Build via Netlify CLI (known working)
            node /usr/lib/node_modules/netlify-cli/bin/run.js build
            
            # Deploy to production
            node /usr/lib/node_modules/netlify-cli/bin/run.js deploy \
              --dir=.netlify/static \
              --functions=.netlify/functions \
              --prod --no-build

            echo "Deploy complete!"
